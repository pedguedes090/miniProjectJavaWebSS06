<!DOCTYPE html>
<html lang="vi" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{main-layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Chi tiết khóa học</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-danger font-weight-bold mb-0" th:text="${course.name}">Tên khóa học</h2>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title text-primary font-weight-bold">Lộ trình / Mô tả</h5>
            <p class="card-text" th:text="${course.description}">Mô tả khóa học</p>

            <hr>

            <table class="table table-bordered table-striped mt-3">
                <tbody>
                <tr>
                    <th style="width: 30%;">Giảng viên</th>
                    <td th:text="${course.instructor}">Tên giảng viên</td>
                </tr>
                <tr>
                    <th>Thời lượng (tuần)</th>
                    <td th:text="${course.duration}">Duration</td>
                </tr>
                <tr>
                    <th>Học phí</th>
                    <td class="text-danger font-weight-bold"
                        th:text="${#numbers.formatDecimal(course.tuitionFee, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                        0 VNĐ
                    </td>
                </tr>
                <tr>
                    <th>Ngày khai giảng</th>
                    <td th:text="${course.startDate}">2026-01-01</td>
                </tr>
                <tr>
                    <th>Số học viên</th>
                    <td th:text="${course.studentCount}">0</td>
                </tr>
                </tbody>
            </table>

            <div class="mt-3">
                <!-- Hiển thị nhãn HẾT CHỖ nếu khóa đã đầy -->
                <span th:if="${course.full}" class="badge badge-danger p-2" style="font-size: 1rem;">HẾT CHỖ</span>
            </div>

            <div class="mt-4">
                <a th:href="@{/course/list}" class="btn btn-secondary">← Quay lại danh sách khóa học</a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
