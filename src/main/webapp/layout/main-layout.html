<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>EDU-PATH</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body class="d-flex flex-column min-vh-100" style="background: #fff8f8;">
    <!--Header-->
    <header class="text-white text-center py-4" style="background: linear-gradient(135deg, #c62828, #d84343);">
        <div class="container">
            <h3 class="font-weight-bold mb-1">EDU-PATH</h3>
            <p class="mb-0">Where Dreams Come True</p>
        </div>
    </header>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white" style="box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);">
        <div class="container">

            <a class="navbar-brand font-weight-bold text-danger" th:href="@{/course/list}">EDU-PATH</a>

                <button class="navbar-toggler" type="button" data-toggle="collapse"
                    data-target="#navbarNav" aria-label="Mo menu dieu huong" title="Mo menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link text-danger font-weight-bold" th:href="@{/course/list}">
                            Danh sách khóa học
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-danger font-weight-bold" href="#">
                            Đăng ký tư vấn
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="container my-4 flex-fill">

        <!-- NỘI DUNG TRANG CON -->
        <div layout:fragment="content"></div>

    </main>

    <!-- Footer -->
    <footer class="text-white text-center py-3 mt-auto" style="background: #c62828;">
        <p class="mb-0 small">&copy; Copyright 2026 EDU-PATH - All rights reserved</p>
    </footer>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
